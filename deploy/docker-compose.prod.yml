# ResponseGrid — all-in-one production stack for a single EC2 t3.small.
# API + Postgres + Redis + automatic HTTPS (Caddy), with idempotent migrations.
#
# Usage (on the EC2, repo cloned):
#   cp deploy/.env.example deploy/.env   # then edit deploy/.env
#   docker compose -f deploy/docker-compose.prod.yml up -d --build
#
# Files are stored in S3 (FILE_STORAGE=s3), so this stack is stateless except
# for the Postgres volume.

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file: .env
    # pg_stat_statements is required for Datadog DBM (query-level monitoring).
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - track_activity_query_size=4096
      - -c
      - pg_stat_statements.track=all
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
    labels:
      com.datadoghq.ad.checks: |
        {"postgres":{"init_config":{},"instances":[{"host":"%%host%%","port":5432,"username":"datadog","password":"%%env_DD_POSTGRES_PASSWORD%%","dbname":"%%env_POSTGRES_DB%%","dbm":true}]}}

  redis:
    image: redis:7
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1']
    volumes:
      - redisdata:/data
    labels:
      com.datadoghq.ad.checks: |
        {"redisdb":{"init_config":{},"instances":[{"host":"%%host%%","port":6379}]}}

  # One-shot, idempotent migration runner: applies apps/api/drizzle/*.sql once
  # each (tracked in a _migrations table), then exits.
  migrate:
    image: postgres:16
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../apps/api/drizzle:/migrations:ro
      - ./migrate.sh:/migrate.sh:ro
    entrypoint: ['sh', '/migrate.sh']
    restart: 'no'

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    # APM: send traces to the datadog agent container; correlate logs with traces.
    environment:
      - DD_TRACE_ENABLED=true
      - DD_AGENT_HOST=datadog
      - DD_TRACE_AGENT_PORT=8126
      - DD_ENV=prod
      - DD_SERVICE=responsegrid-api
      - DD_LOGS_INJECTION=true
      # Tag the real client IP on request spans (read from X-Forwarded-For,
      # set by Caddy) so APM can slice traffic by IP, not just the proxy's.
      - DD_TRACE_CLIENT_IP_ENABLED=true
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    expose:
      - '3000'

  # Reverse proxy with automatic Let's Encrypt TLS for $API_DOMAIN.
  # Requires an A record: API_DOMAIN -> the EC2 public (Elastic) IP.
  caddy:
    image: caddy:2
    restart: unless-stopped
    env_file: .env
    depends_on:
      - api
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config

  # Datadog Agent (lean): host metrics + containers + Postgres + Redis + logs.
  # EU site and secrets (DD_API_KEY, DD_SITE, DD_POSTGRES_PASSWORD) come from
  # deploy/.env via env_file (never committed). APM and process-agent are off
  # to stay light on the box; see deploy/datadog.md.
  datadog:
    image: datadog/agent:7
    restart: unless-stopped
    env_file: .env
    environment:
      - DD_HOSTNAME=responsegrid-prod
      - DD_TAGS=env:prod
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      - DD_PROCESS_AGENT_ENABLED=false
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_CONTAINER_EXCLUDE=name:datadog
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
      - dd-run:/opt/datadog-agent/run:rw
    mem_limit: 768m
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
  redisdata:
  caddydata:
  caddyconfig:
  dd-run:
